# Global pitchfork settings, machine-wide only. Nothing project-specific belongs here:
# per-project daemons live in each repo's own pitchfork.toml.

[settings.general]
# Run daemons through mise so they inherit the project's tool versions and [env].
# Without this they inherit the supervisor's environment instead, and miss anything
# a project computes in mise.toml (ports, API URLs, secrets loaded on entry).
mise = true

# The reverse proxy (https://<slug>.localhost) is deliberately NOT enabled. It only
# routes to slugs declared here as [slugs.<name>] plus a [namespaces.<name>] with an
# absolute project path — pitchfork expands neither ~ nor $HOME, ignores slugs declared
# in a project's own pitchfork.toml, and does not read a config.local.toml. There is
# therefore no way to use it without hardcoding per-project paths into this file.
