# Global pitchfork settings. Per-project daemons live in each repo's pitchfork.toml.

[settings.general]
# Run daemons through mise so they inherit the project's tool versions and [env].
# Without this they inherit the supervisor's environment instead, and miss anything
# a project computes in mise.toml (ports, API URLs, secrets loaded on entry).
mise = true

[settings.proxy]
# Serve each slug below at https://<slug>.localhost, routed to whatever port the
# daemon actually bound. Projects derive their ports from their checkout path, so the
# numbers are deliberately unmemorable — these URLs are the stable handle, and they
# appear in `pitchfork list`. The TLS certificate is installed on first use
# (auto_trust), which needs sudo once.
enable = true

# Slugs map a hostname to a daemon in a project. Add one with
# `pitchfork proxy add <slug> --dir <path> --daemon <name>`, which edits this file
# through the ~/.config/pitchfork symlink, then commit the result via PR.

[slugs.ott]
namespace = "ott"
daemon = "server"

[namespaces.ott]
dir = "/Users/dpoblador/repos/ott"
