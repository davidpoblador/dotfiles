"$schema" = 'https://starship.rs/config-schema.json'

# Performance tuning
scan_timeout = 30        # Milliseconds to scan for git repos
command_timeout = 500    # Max time for module commands
follow_symlinks = false  # Important for network filesystems

format = """
[ŅéČ](color_orange)\
$os\
$username$hostname\
[Ņé░](bg:color_yellow fg:color_orange)\
$git_branch\
$git_status\
[Ņé░](fg:color_yellow bg:color_blue)\
$rust\
$golang\
$nodejs\
$python\
[Ņé░](fg:color_blue bg:color_bg3)\
$docker_context\
[Ņé░](fg:color_bg3 bg:color_aqua)\
$directory\
[Ņé░](fg:color_aqua bg:color_bg1)\
$time\
[Ņé░](fg:color_bg1)\
$line_break\
$character"""

right_format = """${custom.project}"""
palette = 'catppuccin_macchiato'

[palettes.catppuccin_macchiato]
color_fg0 = '#24273a'
color_fg1 = '#cad3f5'
color_bg1 = '#363a4f'
color_bg3 = '#494d64'
color_blue = '#8aadf4'
color_aqua = '#8bd5ca'
color_green = '#a6da95'
color_orange = '#f5a97f'
color_purple = '#c6a0f6'
color_red = '#ed8796'
color_yellow = '#eed49f'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"
[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
