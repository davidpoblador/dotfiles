"$schema" = 'https://starship.rs/config-schema.json'

# Performance tuning
scan_timeout = 30        # Milliseconds to scan for git repos
command_timeout = 500    # Max time for module commands
follow_symlinks = false  # Important for network filesystems

format = """
[оӮ¶](color_prod_red)\
$os\
$hostname\
[оӮ°](bg:color_orange fg:color_prod_red)\
$username\
[оӮ°](bg:color_yellow fg:color_orange)\
$git_branch\
$git_status\
[оӮ°](fg:color_yellow bg:color_aqua)\
$directory\
[оӮ°](fg:color_aqua bg:color_bg1)\
$time\
[оӮ°](fg:color_bg1)\
$line_break\
$character"""
palette = 'catppuccin_macchiato'

[palettes.catppuccin_macchiato]
color_fg0 = '#24273a'
color_fg1 = '#cad3f5'
color_bg1 = '#363a4f'
color_bg3 = '#494d64'
color_blue = '#8aadf4'
color_aqua = '#8bd5ca'
color_green = '#a6da95'
color_orange = '#f5a97f'
color_purple = '#c6a0f6'
color_red = '#ed8796'
color_prod_red = '#e6364d'
color_yellow = '#eed49f'

[os]
disabled = false
style = "bg:color_prod_red fg:color_fg0"
[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_prod_red fg:color_fg0 bold"
format = '[ $user ]($style)'

[directory]
style = "bg:color_aqua"
format = '[[ $path ](bold fg:color_fg0 bg:color_aqua)]($style)'
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = false


[git_branch]
symbol = "пҗҳ"
style = "bg:color_yellow"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_yellow)]($style)'
truncation_length = 20
truncation_symbol = "вҖҰ"
ignore_bare_repo = true

[git_status]
style = "bg:color_yellow"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_yellow)]($style)'
untracked = "вҲҝ"


[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ $time ](fg:color_fg1 bg:color_bg1)]($style)'

[cmd_duration]
min_time = 2000
style = "fg:color_yellow"
format = '[$duration]($style) '

[character]
disabled = false
success_symbol = '[в–¶](bold fg:color_green)'
error_symbol = '[в–¶](bold fg:color_red)'
vimcmd_symbol = '[в–¶](bold fg:color_green)'
vimcmd_replace_one_symbol = '[в–¶](bold fg:color_purple)'
vimcmd_replace_symbol = '[в–¶](bold fg:color_purple)'
vimcmd_visual_symbol = '[в–¶](bold fg:color_yellow)'

[hostname]
ssh_only = false
style = "bg:color_prod_red fg:color_fg0"
format = "[ $hostname ]($style)"
trim_at = "."

