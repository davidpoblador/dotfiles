# Terminal settings (Ghostty)
set -g default-terminal "xterm-ghostty"
set -sa terminal-overrides ",xterm-ghostty:Tc"
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# Enable mouse support
set -g mouse on

# Session behavior
set -g detach-on-destroy on
set -g set-clipboard on
set -g history-limit 50000
set -s escape-time 10
set -g focus-events on
set -g automatic-rename on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# kill pane
bind-key x kill-pane

# Splits inherit current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Pane resizing
bind -n M-h resize-pane -L
bind -n M-l resize-pane -R
bind -n M-k resize-pane -U
bind -n M-j resize-pane -D

# Move window to the left
bind -n M-i swap-window -t -1\; select-window -t -1

# Move window to the right
bind -n M-o swap-window -t +1\; select-window -t +1

# Set vi mode
set-window-option -g mode-keys vi

# Use visual selection mode as vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Catppuccin theme
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# Short hostname (without .local)
set -g @catppuccin_host_text " #h"

# Window names: show current directory instead of hostname
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Custom project module (git repo name, worktree-aware)
source -F ~/.config/tmux/project_module.conf

# Two-line status bar: empty line above, content below
set -g status 2
set -g 'status-format[1]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g 'status-format[0]' ''

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_project}#{E:@catppuccin_status_host}#{E:@catppuccin_status_session}"
