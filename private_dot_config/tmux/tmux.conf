# Extended keys for Ctrl-Shift-Arrow support
set -g extended-keys on

# Catppuccin Macchiato colors
%hidden macchiato_base="#24273a"
%hidden macchiato_mantle="#1e2030"
%hidden macchiato_surface0="#363a4f"
%hidden macchiato_surface1="#494d64"
%hidden macchiato_text="#cad3f5"
%hidden macchiato_subtext0="#a5adcb"
%hidden macchiato_blue="#8aadf4"
%hidden macchiato_green="#a6da95"
%hidden macchiato_peach="#f5a97f"
%hidden macchiato_lavender="#b7bdf8"

# Active/inactive pane dimming
set -g window-style "fg=#{macchiato_subtext0},bg=#{macchiato_mantle}"
set -g window-active-style "fg=#{macchiato_text},bg=#{macchiato_base}"

# Pane borders with labels showing pane number and current command
set -g pane-border-style "fg=#{macchiato_surface1}"
set -g pane-active-border-style "fg=#{macchiato_lavender}"
set -g pane-border-format ' #[bold]#P #[default]#{?pane_title,#{pane_title},#{pane_current_command}} '
set -g pane-border-status top

# Status bar
set -g status-style "bg=#{macchiato_mantle},fg=#{macchiato_text}"
set -g status-left "#[bg=#{macchiato_blue},fg=#{macchiato_base},bold] #S #[default] "
set -g status-right "#[fg=#{macchiato_subtext0}]%H:%M "
set -g window-status-format "#[fg=#{macchiato_subtext0}] #I:#W "
set -g window-status-current-format "#[bg=#{macchiato_surface0},fg=#{macchiato_text},bold] #I:#W "
set -g message-style "bg=#{macchiato_surface0},fg=#{macchiato_text}"
set -g mode-style "bg=#{macchiato_surface1},fg=#{macchiato_text}"

# Fast pane navigation with Ctrl+Shift+Arrow
bind -n C-S-Left select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up select-pane -U
bind -n C-S-Down select-pane -D

# Mouse support — click panes, resize, scroll
set -g mouse on

# Clipboard and terminal passthrough
set -g set-clipboard on
set -g allow-passthrough all

# Copy mouse selection to system clipboard (macOS)
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Terminal overrides for clipboard/cursor compatibility
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -ga update-environment "TERM_PROGRAM"
