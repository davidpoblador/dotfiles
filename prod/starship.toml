# Production server prompt — compact, hostname-forward, visually distinct.

format = """
[](fg:bg_dark)\
$hostname\
$directory\
$git_branch\
$git_status\
[](fg:bg_dark)\
 $cmd_duration\
$character"""

palette = "prod"

[palettes.prod]
bg_dark = "#494d64"
fg_light = "#cad3f5"
red = "#ed8796"
peach = "#f5a97f"
green = "#a6da95"
yellow = "#eed49f"
blue = "#8aadf4"

[hostname]
ssh_only = false
style = "bg:red fg:bg_dark bold"
format = "[ $hostname ]($style)"
trim_at = "."

[directory]
style = "bg:bg_dark fg:fg_light"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = ""
style = "bg:bg_dark fg:yellow"
format = "[ $symbol $branch ]($style)"
truncation_length = 20
truncation_symbol = "..."

[git_status]
style = "bg:bg_dark fg:peach"
format = "[($all_status$ahead_behind )]($style)"

[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = "[$duration]($style) "

[character]
success_symbol = "[\\$](green)"
error_symbol = "[\\$](red)"
